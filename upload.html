<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — NMGC</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/N_logo.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Password gate ── */
    #password-gate {
      min-height: calc(100vh - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      background: var(--gray);
    }
    .gate-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    #password-error {
      display: none;
      font-size: 0.78rem;
      color: #c0392b;
      font-weight: 600;
      margin-top: 0.5rem;
    }

    /* ── Upload section ── */
    #upload-section { display: none; }

    /* ── Step progress ── */
    .step-progress {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 1.75rem;
    }
    .step-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      flex: 1;
      position: relative;
    }
    .step-node:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 14px;
      left: 50%;
      width: 100%;
      height: 2px;
      background: var(--border);
      z-index: 0;
    }
    .step-node.done:not(:last-child)::after { background: var(--green); }
    .step-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: #bbb;
      position: relative;
      z-index: 1;
      transition: all 0.2s;
    }
    .step-node.active .step-circle {
      border-color: var(--green);
      background: var(--green);
      color: white;
    }
    .step-node.done .step-circle {
      border-color: var(--green);
      background: var(--green);
      color: white;
    }
    .step-label {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #bbb;
      text-align: center;
    }
    .step-node.active .step-label,
    .step-node.done .step-label { color: var(--green); }

    /* ── Step panels ── */
    .step-panel {
      display: none;
      animation: fadeIn 0.2s ease;
    }
    .step-panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .step-panel .card { margin-bottom: 0; }

    /* ── Selection summary chips ── */
    .selection-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }
    .selection-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--green-light);
      border: 1.5px solid #b8cf6e;
      border-radius: 99px;
      padding: 0.2rem 0.65rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #2a4a10;
      cursor: pointer;
    }
    .selection-chip .chip-x {
      font-size: 0.7rem;
      opacity: 0.6;
      margin-left: 0.1rem;
    }
    .selection-chip:hover { opacity: 0.8; }

    /* ── Option buttons ── */
    .option-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }
    .option-grid.single-col { grid-template-columns: 1fr; }
    .option-btn {
      padding: 0.7rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      background: white;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      line-height: 1.3;
    }
    .option-btn:hover {
      border-color: var(--green);
      background: var(--green-light);
      color: #1a3a05;
    }
    .option-btn.selected {
      border-color: var(--green);
      background: var(--green);
      color: white;
    }

    /* ── Filename preview ── */
    .filename-preview {
      background: var(--gray);
      border: 1.5px solid var(--border);
      border-radius: 7px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
    }
    .filename-preview-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .filename-preview-text {
      font-family: 'Courier Prime', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: var(--green);
    }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: #fafafa;
      position: relative;
      margin-bottom: 1rem;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--green);
      background: var(--green-light);
    }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-zone-icon { font-size: 2rem; margin-bottom: 0.4rem; }
    .upload-zone-label { font-size: 0.875rem; font-weight: 600; color: #444; }
    .upload-zone-sub { font-size: 0.75rem; color: #999; margin-top: 0.2rem; }
    .upload-zone-file { font-size: 0.82rem; color: var(--green); font-weight: 700; margin-top: 0.5rem; }

    /* ── Progress bar ── */
    .progress-wrap {
      display: none;
      background: #eee;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .progress-bar {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      width: 0%;
      transition: width 0.2s;
    }

    /* ── Status ── */
    .upload-status {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .upload-status.success {
      background: var(--green-light);
      color: #2a4a10;
      border: 1.5px solid #b8cf6e;
    }
    .upload-status.error {
      background: #fde8e8;
      color: #8b0000;
      border: 1.5px solid #f0a0a0;
    }

    /* ── Club file status badges ── */
    .club-file-badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.15rem 0.45rem;
      border-radius: 99px;
      background: #eee;
      color: #aaa;
      white-space: nowrap;
    }
    .club-file-badge.uploaded {
      background: #e6f4d0;
      color: #3a6a10;
    }
    .club-file-badge.not-uploaded {
      background: #f5f5f5;
      color: #bbb;
    }

    /* ── Start over ── */
